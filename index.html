<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Throughput Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pivottable@2.23.0/dist/pivot.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
    .navbar { background: #1a3c6e; }
    .navbar-brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
    .navbar-brand span { color: #4fc3f7; }
    .card { border: none; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 16px; }
    .card-header { background: #fff; border-bottom: 2px solid #e8ecf0; font-weight: 600; font-size: 0.95rem; padding: 12px 16px; }
    .nav-tabs .nav-link { color: #555; font-weight: 500; border-radius: 8px 8px 0 0; margin-right: 4px; }
    .nav-tabs .nav-link.active { background: #1a3c6e; color: #fff; }
    .pvtVal { background: #eaf2ff; font-weight: 600; }
    .pvtGrandTotal { background: #1a3c6e !important; color: #fff !important; font-weight: 700; }
    .preset-btns { margin-bottom: 12px; }
    .preset-btns .btn { font-size: 0.8rem; padding: 3px 10px; }
    .preset-btns .btn.active { background: #1a3c6e; color: #fff; border-color: #1a3c6e; }
    .info-bar { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    .tab-legend { font-size: 0.78rem; color: #888; }
    .tab-legend strong { color: #555; }
    .pvtTable { font-size: 12px; }
    .chart-container { position: relative; height: 300px; background: #fff; border-radius: 6px; margin-bottom: 16px; padding: 12px; border: 1px solid #e0e6ed; }
    .chart-container canvas { max-height: 276px; }
    #spinner { display: none; text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-3">
  <div class="container-fluid">
    <span class="navbar-brand">Terminal Throughput <span>Dashboard</span></span>
    <span class="text-white-50" style="font-size:.85rem">2025–2026 YTD &nbsp;|&nbsp; <span id="rowCount">–</span> records &nbsp;|&nbsp; <span id="dataRange">–</span></span>
  </div>
</nav>

<div class="container-fluid px-3">
  <ul class="nav nav-tabs" id="pivotTabs" role="tablist"></ul>
  <div class="tab-content" id="pivotTabContent">
    <div id="spinner"><div class="spinner-border text-primary" role="status"></div><div class="mt-2">Loading data...</div></div>
  </div>
</div>

<!-- Load scripts in correct order -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-ui-dist@1.13.2/jquery-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pivottable@2.23.0/dist/pivot.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pivottable@2.23.0/dist/export_renderers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
(async () => {
  const spinner = document.getElementById('spinner');
  spinner.style.display = 'block';

  // ── Load data ───────────────────────────────────────────────────────────────
  const zipResp = await fetch('data/pivot_data.zip');
  const zip = await JSZip.loadAsync(await zipResp.blob());
  const jsonFile = zip.file('pivot_data.json');
  if (!jsonFile) { alert('pivot_data.json not found!'); return; }
  const rawData = JSON.parse(await jsonFile.async('string'));
  spinner.style.display = 'none';

  document.getElementById('rowCount').textContent = rawData.length.toLocaleString();
  const atds = rawData.map(r => r['ATD'] || '').filter(Boolean).sort();
  document.getElementById('dataRange').textContent = atds[0] + ' ~ ' + atds[atds.length - 1];

  // Pre-compute derived columns
  rawData.forEach(r => {
    r['Fulfill Rate'] = (r['Booking TEU'] > 0) ? r['Actual TEU'] / r['Booking TEU'] : 0;
  });

  // ── YoY / MoM helper for Outbound / Inbound reports ───────────────────────
  function buildYoYMoM(baseData) {
    const agg = {};
    baseData.forEach(r => {
      const k = `${r.Port}|${r['ATD_Year']}|${r['ATD Month']}`;
      if (!agg[k]) agg[k] = { Port: r.Port, ATD_Year: r['ATD_Year'], 'ATD Month': r['ATD Month'], 'Actual TEU': 0 };
      agg[k]['Actual TEU'] += (r['Actual TEU'] || 0);
    });
    const prevYear = yr => { const y = parseInt(yr); return isNaN(y) ? '' : String(y - 1); };
    const prevMonth = mo => {
      if (!mo) return '';
      const [y, m] = mo.split('-').map(Number);
      if (isNaN(y) || isNaN(m)) return '';
      const d = new Date(y, m - 2, 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    };
    const enriched = [];
    const aggVal = (port, yr, mo) => {
      const k = `${port}|${yr}|${mo}`;
      return agg[k] ? agg[k]['Actual TEU'] : 0;
    };
    Object.keys(agg).forEach(k => {
      const r = { ...agg[k] };
      r['VS. Last Year']  = r['Actual TEU'] - aggVal(r.Port, prevYear(r.ATD_Year), r['ATD Month']);
      r['VS. Last Month'] = r['Actual TEU'] - aggVal(r.Port, r.ATD_Year, prevMonth(r['ATD Month']));
      enriched.push(r);
    });
    return enriched;
  }

  const dataOB = buildYoYMoM(rawData.filter(r => ['OUT', 'T/S OUT'].includes(r.TYPE)));
  const dataIB = buildYoYMoM(rawData.filter(r => ['IN', 'T/S IN'].includes(r.TYPE)));
  const computedMap = { outbound: dataOB, inbound: dataIB };

  // ── Tab configs (mirrors Excel pivot_table.py) ────────────────────────────
  const tabs = [
    {
      id: 'port-month', title: 'Port x Month',
      rows: ['Port'], cols: ['ATD Month'], vals: ['Actual TEU'],
      filter: { 'ATD_Year': '2026' },
      sortDesc: true,
      legend: 'Row: Port | Col: ATD Month | Filter: ATD_Year=2026 | Val: Actual TEU'
    },
    {
      id: 'lane-month', title: 'Lane x Month',
      rows: ['Lane'], cols: ['ATD Month'], vals: ['Actual TEU'],
      filter: { 'ATD_Year': '2026' },
      sortDesc: true,
      legend: 'Row: Lane | Col: ATD Month | Filter: ATD_Year=2026 | Val: Actual TEU'
    },
    {
      id: 'port-lane-type', title: 'Port x Lane x Type',
      rows: ['Port', 'Lane'], cols: ['TYPE', 'Load Status'], vals: ['Actual TEU'],
      filter: { 'ATD_Year': '2026' },
      sortDesc: true,
      subtotalRows: true,
      legend: 'Row: Port + Lane | Col: TYPE + Load Status | Filter: ATD_Year=2026 | Val: Actual TEU'
    },
    {
      id: 'weekly-trend', title: 'Weekly Trend',
      rows: ['Week'], cols: [], vals: ['Actual TEU'],
      filter: { 'ATD_Year': '2026' },
      legend: 'Row: Week | Filter: ATD_Year=2026 | Val: Actual TEU',
      chart: true
    },
    {
      id: 'booking', title: 'Booking vs Actual',
      rows: ['Port'], cols: [], vals: ['Booking TEU', 'Actual TEU', 'Gap', 'Fulfill Rate'],
      filter: { 'ATD_Year': '2026' },
      legend: 'Row: Port | Filter: ATD_Year=2026 | Val: Booking TEU + Actual TEU + Gap + Fulfill Rate'
    },
    {
      id: 'outbound', title: 'Outbound Report',
      rows: ['Port'], cols: ['ATD_Year', 'ATD Month'], vals: ['Actual TEU', 'VS. Last Year', 'VS. Last Month'],
      filter: { 'TYPE': ['OUT', 'T/S OUT'] },
      computed: true,
      legend: 'Row: Port | Col: ATD_Year + ATD Month | Filter: TYPE (OUT/T/S OUT) | Val: Actual TEU + VS. Last Year + VS. Last Month'
    },
    {
      id: 'inbound', title: 'Inbound Report',
      rows: ['Port'], cols: ['ATD_Year', 'ATD Month'], vals: ['Actual TEU', 'VS. Last Year', 'VS. Last Month'],
      filter: { 'TYPE': ['IN', 'T/S IN'] },
      computed: true,
      legend: 'Row: Port | Col: ATD_Year + ATD Month | Filter: TYPE (IN/T/S IN) | Val: Actual TEU + VS. Last Year + VS. Last Month'
    }
  ];

  // ── Build tab DOM ───────────────────────────────────────────────────────────
  const tabList    = document.getElementById('pivotTabs');
  const tabContent = document.getElementById('pivotTabContent');

  tabs.forEach((cfg, idx) => {
    const tabId = 'tab-' + cfg.id;
    tabList.innerHTML += `<li class="nav-item" role="presentation">
      <button class="nav-link${idx === 0 ? ' active' : ''}" id="${tabId}-btn"
        data-bs-toggle="tab" data-bs-target="#${tabId}" type="button" role="tab">${cfg.title}</button></li>`;

    const chartDiv = cfg.chart
      ? `<div class="chart-container"><canvas id="chart-${cfg.id}"></canvas></div>` : '';

    tabContent.innerHTML += `
      <div class="tab-pane fade${idx === 0 ? ' show active' : ''}" id="${tabId}" role="tabpanel">
        <div class="card mt-2">
          <div class="card-header"><span>Field Layout: </span><span class="tab-legend">${cfg.legend}</span></div>
          <div class="card-body p-2">${chartDiv}<div id="pivot-${cfg.id}"></div></div>
        </div>
      </div>`;
  });

  // Init Bootstrap tabs
  document.querySelectorAll('[data-bs-toggle="tab"]').forEach(t => new bootstrap.Tab(t));

  // ── Chart instance ─────────────────────────────────────────────────────────
  let weeklyChart = null;

  function drawWeeklyChart(filtered) {
    const canvas = document.getElementById('chart-weekly-trend');
    if (!canvas) return;

    const byWeek = {};
    filtered.forEach(r => {
      const w = String(r.Week || '');
      if (!w) return;
      byWeek[w] = (byWeek[w] || 0) + (r['Actual TEU'] || 0);
    });

    const sorted = Object.keys(byWeek).sort((a, b) => Number(a) - Number(b));
    const values = sorted.map(w => byWeek[w]);

    if (weeklyChart) weeklyChart.destroy();

    weeklyChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: sorted.map(w => 'W' + w),
        datasets: [{
          label: 'Actual TEU',
          data: values,
          borderColor: '#1a3c6e',
          backgroundColor: 'rgba(26,60,110,0.1)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointBackgroundColor: '#4fc3f7',
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'top', labels: { font: { size: 12 } } },
          tooltip: {
            callbacks: {
              title: ctx => 'Week ' + ctx[0].label,
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} TEU`
            }
          }
        },
        scales: {
          x: { title: { display: true, text: 'Week' }, ticks: { maxRotation: 45, font: { size: 11 } } },
          y: { title: { display: true, text: 'Actual TEU' }, ticks: { font: { size: 11 } }, beginAtZero: true }
        }
      }
    });
  }

  // ── Render pivot ───────────────────────────────────────────────────────────
  function applyFilter(dataSrc, filter) {
    return dataSrc.filter(row => {
      for (const [k, v] of Object.entries(filter || {})) {
        const rv = String(row[k] ?? '');
        if (Array.isArray(v)) { if (!v.includes(rv)) return false; }
        else { if (rv !== v) return false; }
      }
      return true;
    });
  }

  // Compute row order: sort by first row field by sum of first val descending
  function getRowOrder(filtered, rowField, valField) {
    const sums = {};
    filtered.forEach(r => {
      const k = String(r[rowField] || '');
      if (!k) return;
      sums[k] = (sums[k] || 0) + (r[valField] || 0);
    });
    return Object.entries(sums).sort((a, b) => b[1] - a[1]).map(e => e[0]);
  }

  // Inject "∑ Total" rows after each parent group
  function injectSubtotalRows(data, parentField, childField, valFields) {
    const result = [];
    const parents = [...new Set(data.map(r => String(r[parentField] || '')))].filter(Boolean);
    parents.forEach(p => {
      const children = data.filter(r => String(r[parentField] || '') === p);
      children.forEach(r => result.push(r));
      const sub = { [parentField]: p, [childField]: '∑ Total' };
      valFields.forEach(v => {
        sub[v] = children.reduce((s, r) => s + (r[v] || 0), 0);
      });
      result.push(sub);
    });
    return result;
  }

  // Sanitize: replace undefined/null with empty string
  function sanitize(arr) {
    return arr.map(row => {
      const clean = {};
      for (const k in row) {
        clean[k] = (row[k] === undefined || row[k] === null) ? '' : row[k];
      }
      return clean;
    });
  }

  function renderPivot(cfg) {
    const src = cfg.computed ? computedMap[cfg.id] : rawData;
    let filtered = applyFilter(src, cfg.filter);
    const target = document.getElementById('pivot-' + cfg.id);
    target.innerHTML = '';

    // Inject subtotal rows if needed (Port x Lane x Type)
    if (cfg.subtotalRows && cfg.rows.length >= 2) {
      filtered = sanitize(injectSubtotalRows(filtered, cfg.rows[0], cfg.rows[1], cfg.vals));
    } else {
      filtered = sanitize(filtered);
    }

    // Row order for sortDesc tabs
    const valKey = cfg.vals[0];
    const rowOrder = cfg.sortDesc
      ? getRowOrder(applyFilter(src, cfg.filter), cfg.rows[0], valKey)
      : null;

    // Use correct aggregator: Fulfill Rate needs "Average", rest use "Integer Sum"
    const hasFulfillRate = cfg.vals.includes('Fulfill Rate');
    const aggName = hasFulfillRate ? 'Integer Sum' : 'Integer Sum';

    const opts = {
      rows: cfg.rows,
      cols: cfg.cols,
      vals: cfg.vals,
      aggregatorName: aggName,
      rowOrder: rowOrder,
      onRefresh: function(pivotUI) {
        pivotUI.find('.pvtGrandTotal').addClass('pvtGrandTotal');
        pivotUI.find('td:contains("\u2211 Total")').css('font-weight', '700').parent().css('background', '#dce8fe');
      }
    };

    try {
      $(target).pivotUI(filtered, opts, true);
    } catch(e) {
      target.innerHTML = '<div style="color:red;padding:20px">Pivot error: ' + e.message + '</div>';
    }

    if (cfg.chart) drawWeeklyChart(applyFilter(src, cfg.filter));
  }

  // ── Init: render all tabs immediately ─────────────────────────────────────
  tabs.forEach(cfg => renderPivot(cfg));

})();
</script>
</body>
</html>
