<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Throughput Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31/styles/ag-theme-balham.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31/dist/ag-grid-community.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; padding: 0; }
    .nav-tabs { margin-bottom: 0; background: #fff; padding: 0 20px; border-bottom: 2px solid #ddd; }
    .nav-tabs > li > a { color: #555; font-weight: 600; border-radius: 0; padding: 12px 20px; }
    .nav-tabs > li.active > a { border-top: 3px solid #2c5aa0; color: #2c5aa0; }
    .tab-content { background: #fff; min-height: 600px; }
    .tab-pane { padding: 15px; }
    .legend { background: #eef3fb; border: 1px solid #c5d5ea; border-radius: 4px; padding: 8px 14px; font-size: 12px; color: #2c5aa0; margin-bottom: 10px; }
    #chart-container { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 15px; margin-bottom: 15px; height: 260px; }
    .ag-theme-balham .ag-row.row-port-total { background: #dce8fe !important; font-weight: 700; }
    .ag-theme-balham .ag-row.row-port-total .ag-cell { color: #1a3a8f; }
    .subtitle { font-size: 11px; color: #888; margin-top: 3px; }
    .tab-count { background: #2c5aa0; color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 6px; }
    #chart-weekly-canvas { max-height: 180px; }
  </style>
</head>
<body>

<div class="container-fluid" style="padding:0">
  <div style="background:#2c5aa0; color:#fff; padding:14px 24px; font-size:18px; font-weight:700;">
    Terminal Throughput Dashboard
    <span style="font-size:12px; font-weight:400; opacity:0.8; margin-left:12px;">— 2026 —</span>
  </div>

  <ul class="nav nav-tabs" id="mainTabs" role="tablist"></ul>

  <div class="tab-content" id="mainTabContent">
    <div role="tabpanel" class="tab-pane" id="tab-port-month"><div class="legend"></div><div id="grid-port-month" class="ag-theme-balham" style="height:500px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-lane-month"><div class="legend"></div><div id="grid-lane-month" class="ag-theme-balham" style="height:500px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-port-lane-type"><div class="legend"></div><div id="grid-port-lane-type" class="ag-theme-balham" style="height:600px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-weekly-trend">
      <div class="legend"></div>
      <div id="chart-container"><canvas id="chart-weekly-canvas"></canvas></div>
      <div id="grid-weekly-trend" class="ag-theme-balham" style="height:400px;width:100%"></div>
    </div>
    <div role="tabpanel" class="tab-pane" id="tab-booking-actual"><div class="legend"></div><div id="grid-booking-actual" class="ag-theme-balham" style="height:500px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-outbound"><div class="legend"></div><div id="grid-outbound" class="ag-theme-balham" style="height:600px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-inbound"><div class="legend"></div><div id="grid-inbound" class="ag-theme-balham" style="height:600px;width:100%"></div></div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
let rawData = [];

fetch('https://Leylalyu-cul.github.io/terminal-throughput-dashboard/data/pivot_data.json')
  .then(r => r.json())
  .then(data => {
    rawData = data;
    initDashboard();
  })
  .catch(() => {
    document.body.innerHTML += '<div style="padding:20px;color:red;font-size:16px">Failed to load data. Please refresh.</div>';
  });

function initDashboard() {

// Pre-compute YoY / MoM helpers
const prevYear  = yr => { const y = parseInt(yr); return isNaN(y) ? '' : String(y - 1); };
const prevMonth = mo => {
  if (!mo) return '';
  const [y, m] = mo.split('-').map(Number);
  if (isNaN(y) || isNaN(m)) return '';
  const d = new Date(y, m - 2, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
};

function aggTEU(data, groupBy) {
  const map = {};
  data.forEach(r => {
    const k = groupBy.map(f => (r[f] ?? '')).join('|');
    if (!map[k]) { map[k] = { ...r }; map[k]['Actual TEU'] = 0; map[k]['Booking TEU'] = 0; }
    map[k]['Actual TEU']  += (r['Actual TEU']  || 0);
    map[k]['Booking TEU'] += (r['Booking TEU'] || 0);
  });
  return Object.values(map);
}

function buildYoYMoM(baseData, groupFields, extraFields = []) {
  const aggMap = {};
  baseData.forEach(r => {
    const gf = groupFields.map(f => (r[f] ?? '')).join('|');
    if (!aggMap[gf]) { aggMap[gf] = { ...r, 'Actual TEU': 0 }; }
    aggMap[gf]['Actual TEU'] += (r['Actual TEU'] || 0);
    extraFields.forEach(f => { aggMap[gf][f] = r[f]; });
  });

  const valMap = {};
  Object.values(aggMap).forEach(r => {
    const vk = groupFields.map(f => (r[f] ?? '')).join('|');
    valMap[vk] = r['Actual TEU'];
  });

  return Object.values(aggMap).map(r => {
    const vk = groupFields.map(f => (r[f] ?? '')).join('|');
    const lyk = [prevYear(r.ATD_Year), r['ATD Month']].join('|');
    const lmk = [r.ATD_Year, prevMonth(r['ATD Month'])].join('|');
    r['VS. Last Year']  = r['Actual TEU'] - (valMap[lyk] || 0);
    r['VS. Last Month'] = r['Actual TEU'] - (valMap[lmk] || 0);
    return r;
  });
}

const dataY2026 = rawData.filter(r => String(r['ATD_Year'] || '') === '2026');
const dataWeek  = rawData.filter(r => String(r['ATD_Year'] || '') === '2026');
const dataOB    = buildYoYMoM(rawData.filter(r => ['OUT','T/S OUT'].includes(r.TYPE)), ['Port','ATD_Year','ATD Month']);
const dataIB    = buildYoYMoM(rawData.filter(r => ['IN','T/S IN'].includes(r.TYPE)),  ['Port','ATD_Year','ATD Month']);

// AG Grid License (Community = no key needed)
</script>
<script>
// ─── CHART ────────────────────────────────────────────────────────────────────
let weeklyChart = null;
function drawWeeklyChart(data) {
  const ctx = document.getElementById('chart-weekly-canvas').getContext('2d');
  if (weeklyChart) weeklyChart.destroy();
  // Sort by week number
  const sorted = [...data].sort((a, b) => {
    const wa = parseInt(String(a.Week || '').replace(/\D/g, '')) || 0;
    const wb = parseInt(String(b.Week || '').replace(/\D/g, '')) || 0;
    return wa - wb;
  });
  weeklyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: sorted.map(r => r.Week),
      datasets: [{
        label: 'Actual TEU',
        data: sorted.map(r => r['Actual TEU'] || 0),
        borderColor: '#2c5aa0',
        backgroundColor: 'rgba(44,90,160,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'top' },
        title: { display: true, text: 'Weekly Trend — Actual TEU (2026)', font: { size: 14 } }
      },
      scales: {
        y: { beginAtZero: true, title: { display: true, text: 'Actual TEU' } },
        x: { title: { display: true, text: 'Week' } }
      }
    }
  });
}

// ─── AG GRID ──────────────────────────────────────────────────────────────────
function makeGridOpts(containerId, rowData, colDefs, defaultColDef) {
  const opts = {
    columnDefs: colDefs,
    rowData: rowData,
    defaultColDef: Object.assign({
      sortable: true,
      resizable: true,
      filter: true,
      minWidth: 80
    }, defaultColDef || {}),
    animateRows: true,
    suppressMovable: false,
    onGridReady: params => params.api.sizeColumnsToFit()
  };
  return opts;
}

// Helper: integer formatter
const fmtInt = v => (v == null) ? '' : v.toLocaleString('en-US');

// Helper: percent formatter
const fmtPct = v => (v == null) ? '' : (v * 100).toFixed(1) + '%';

// Helper: render row with custom data
function makeColDef(field, header, agg = 'sum', enablePivot = false) {
  return {
    field,
    headerName: header,
    enablePivot,
    aggFunc: agg === 'sum' ? 'sum' : (agg === 'avg' ? 'avg' : null),
    valueFormatter: params => {
      if (field === 'Fulfill Rate') return fmtPct(params.value);
      if (typeof params.value === 'number') return fmtInt(params.value);
      return params.value;
    },
    type: typeof field === 'string' && (field.includes('TEU') || field === 'Fulfill Rate') ? 'numericColumn' : null
  };
}

// ─── Tab 1: Port x Month ──────────────────────────────────────────────────────
const portMonthData = aggTEU(dataY2026, ['Port','ATD Month']);
const portMonthCols = [
  makeColDef('Port', 'Port', 'sum'),
  makeColDef('ATD Month', 'ATD Month', 'sum'),
  makeColDef('Actual TEU', 'Actual TEU', 'sum')
];

// ─── Tab 2: Lane x Month ──────────────────────────────────────────────────────
const laneMonthData = aggTEU(dataY2026, ['Lane','ATD Month']);
const laneMonthCols = [
  makeColDef('Lane', 'Lane', 'sum'),
  makeColDef('ATD Month', 'ATD Month', 'sum'),
  makeColDef('Actual TEU', 'Actual TEU', 'sum')
];

// ─── Tab 3: Port x Lane x Type ───────────────────────────────────────────────
// Use AG Grid row grouping via autoGroupColumnDef
const pltData = aggTEU(dataY2026, ['Port','Lane','TYPE','Load Status']);
const pltCols = [
  { field: 'Port',        headerName: 'Port',        rowGroup: true, hide: true },
  { field: 'Lane',        headerName: 'Lane',        rowGroup: true, hide: true },
  { field: 'TYPE',        headerName: 'TYPE',        enableRowGroup: true },
  { field: 'Load Status', headerName: 'Load Status', enableRowGroup: true },
  makeColDef('Actual TEU', 'Actual TEU', 'sum')
];

// ─── Tab 4: Weekly Trend ──────────────────────────────────────────────────────
const weekMap = {};
dataWeek.forEach(r => {
  const w = r.Week;
  if (!weekMap[w]) weekMap[w] = { Week: w, 'Actual TEU': 0 };
  weekMap[w]['Actual TEU'] += (r['Actual TEU'] || 0);
});
const weekData = Object.values(weekMap).sort((a, b) => {
  const wa = parseInt(String(a.Week||'').replace(/\D/g,''))||0;
  const wb = parseInt(String(b.Week||'').replace(/\D/g,''))||0;
  return wa - wb;
});
const weekCols = [
  makeColDef('Week', 'Week', 'sum'),
  makeColDef('Actual TEU', 'Actual TEU', 'sum')
];

// ─── Tab 5: Booking vs Actual ─────────────────────────────────────────────────
const bkaData = aggTEU(dataY2026, ['Port']);
bkaData.forEach(r => {
  r['Fulfill Rate'] = r['Booking TEU'] > 0 ? r['Actual TEU'] / r['Booking TEU'] : 0;
  r['Gap'] = r['Actual TEU'] - r['Booking TEU'];
});
const bkaCols = [
  makeColDef('Port', 'Port', 'sum'),
  makeColDef('Booking TEU', 'Booking TEU', 'sum'),
  makeColDef('Actual TEU', 'Actual TEU', 'sum'),
  {
    field: 'Gap',
    headerName: 'Gap (Actual-Booking)',
    type: 'numericColumn',
    valueFormatter: p => fmtInt(p.value)
  },
  {
    field: 'Fulfill Rate',
    headerName: 'Fulfill Rate',
    type: 'numericColumn',
    valueFormatter: p => fmtPct(p.value)
  }
];

// ─── Tab 6 & 7: OB / IB ───────────────────────────────────────────────────────
const obibCols = (title) => [
  makeColDef('Port', 'Port', 'sum'),
  makeColDef('ATD_Year', 'Year', 'sum'),
  makeColDef('ATD Month', 'Month', 'sum'),
  makeColDef('Actual TEU', 'Actual TEU', 'sum'),
  makeColDef('VS. Last Year', 'VS. Last Year', 'sum'),
  makeColDef('VS. Last Month', 'VS. Last Month', 'sum')
];

// ─── INIT ─────────────────────────────────────────────────────────────────────
const grids = {};

function initGrid(tabId, containerId, rowData, colDefs, extraOpts) {
  const gridDiv = document.getElementById(containerId);
  const opts = makeGridOpts(containerId, rowData, colDefs, extraOpts);
  if (tabId === 'tab-port-lane-type') {
    opts.autoGroupColumnDef = {
      headerName: 'Port / Lane',
      minWidth: 200,
      cellRendererParams: { suppressCount: false }
    };
    opts.groupDefaultExpanded = 1;
    opts.suppressAggFuncInHeader = false;
  }
  grids[tabId] = agGrid.createGrid(gridDiv, opts);
}

// Wait for tab switch to init charts
$('#mainTabs').on('shown.bs.tab', function(e) {
  const tabId = $(e.target).attr('href');
  if (tabId === '#tab-weekly-trend' && !weeklyChart) {
    drawWeeklyChart(weekData);
  }
  if (tabId === '#tab-port-lane-type' && !grids['tab-port-lane-type']) {
    initGrid('tab-port-lane-type', 'grid-port-lane-type', pltData, pltCols);
  }
  // Size columns on tab shown
  if (grids[tabId]) grids[tabId].api.sizeColumnsToFit();
});

// Build tabs
const tabs = [
  { id: 'tab-port-month',       title: 'Port × Month',       legend: 'Row: Port | Col: ATD Month | Val: Actual TEU | Filter: ATD_Year=2026' },
  { id: 'tab-lane-month',       title: 'Lane × Month',       legend: 'Row: Lane | Col: ATD Month | Val: Actual TEU | Filter: ATD_Year=2026' },
  { id: 'tab-port-lane-type',   title: 'Port × Lane × Type', legend: 'Row: Port + Lane (grouped) | Col: TYPE + Load Status | Val: Actual TEU | Filter: ATD_Year=2026' },
  { id: 'tab-weekly-trend',     title: 'Weekly Trend',        legend: 'Row: Week | Val: Actual TEU | Chart: Line | Filter: ATD_Year=2026' },
  { id: 'tab-booking-actual',   title: 'Booking vs Actual',   legend: 'Row: Port | Val: Booking TEU + Actual TEU + Gap + Fulfill Rate | Filter: ATD_Year=2026' },
  { id: 'tab-outbound',         title: 'Outbound Report',     legend: 'Row: Port | Col: Year + Month | Val: Actual TEU + VS LY + VS LM' },
  { id: 'tab-inbound',          title: 'Inbound Report',      legend: 'Row: Port | Col: Year + Month | Val: Actual TEU + VS LY + VS LM' }
];

tabs.forEach((t, i) => {
  $('#mainTabs').append(`<li role="presentation"${i===0?' class="active"':''}><a href="#${t.id}" aria-controls="${t.id}" role="tab" data-toggle="tab">${t.title}</a></li>`);
  $(`#${t.id} .legend`).text(t.legend);
});

$('#mainTabs a:first').tab('show');

// Init first tab immediately
initGrid('tab-port-month', 'grid-port-month', portMonthData, portMonthCols);

// Init others lazily on tab switch
const lazyInit = {
  'tab-lane-month':      () => initGrid('tab-lane-month',      'grid-lane-month',      laneMonthData, laneMonthCols),
  'tab-booking-actual':  () => initGrid('tab-booking-actual',  'grid-booking-actual',  bkaData, bkaCols),
  'tab-outbound':        () => initGrid('tab-outbound',        'grid-outbound',        dataOB, obibCols()),
  'tab-inbound':         () => initGrid('tab-inbound',         'grid-inbound',         dataIB, obibCols())
};

$('#mainTabs').on('shown.bs.tab', function(e) {
  const tabId = $(e.target).attr('href');
  if (lazyInit[tabId]) { lazyInit[tabId](); delete lazyInit[tabId]; }
  if (tabId === '#tab-weekly-trend' && weekData.length) drawWeeklyChart(weekData);
});
  } // end initDashboard
</script>
</body>
</html>
