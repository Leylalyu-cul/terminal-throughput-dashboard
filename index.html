<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Throughput Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://unpkg.com/ag-grid-community@30.0.6/styles/ag-grid.css">
  <link rel="stylesheet" href="https://unpkg.com/ag-grid-community@30.0.6/styles/ag-theme-balham.css">
  <script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://unpkg.com/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
  <script src="https://unpkg.com/ag-grid-community@30.0.6/dist/ag-grid-community.min.noHeader.js"></script>
  <script src="https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; padding: 0; }
    .nav-tabs { margin-bottom: 0; background: #fff; padding: 0 20px; border-bottom: 2px solid #ddd; }
    .nav-tabs > li > a { color: #555; font-weight: 600; border-radius: 0; padding: 12px 20px; }
    .nav-tabs > li.active > a { border-top: 3px solid #2c5aa0; color: #2c5aa0; }
    .tab-content { background: #fff; min-height: 600px; }
    .tab-pane { padding: 15px; }
    .legend { background: #eef3fb; border: 1px solid #c5d5ea; border-radius: 4px; padding: 8px 14px; font-size: 12px; color: #2c5aa0; margin-bottom: 10px; }
    #chart-container { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 15px; margin-bottom: 15px; height: 260px; }
    .ag-theme-balham .ag-row.row-port-total { background: #dce8fe !important; font-weight: 700; }
    .ag-theme-balham .ag-row.row-port-total .ag-cell { color: #1a3a8f; }
    .ag-theme-balham .ag-row.row-group { font-weight: 600; }
    .subtitle { font-size: 11px; color: #888; margin-top: 3px; }
    .tab-count { background: #2c5aa0; color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 6px; }
    #chart-weekly-canvas { max-height: 180px; }
    .pivot-field-list { background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 10px; }
    .pivot-field-list .field-item { display: inline-block; background: #e3ebf9; border: 1px solid #b3c6e8; border-radius: 4px; padding: 4px 10px; margin: 3px; font-size: 12px; color: #2c5aa0; cursor: default; }
    .pivot-field-list .field-label { font-weight: 700; margin-bottom: 6px; color: #555; font-size: 11px; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container-fluid" style="padding:0">
  <div style="background:#2c5aa0; color:#fff; padding:14px 24px; font-size:18px; font-weight:700;">
    Terminal Throughput Dashboard
    <span style="font-size:12px; font-weight:400; opacity:0.8; margin-left:12px;">— 2026 —</span>
  </div>

  <ul class="nav nav-tabs" id="mainTabs" role="tablist"></ul>

  <div class="tab-content" id="mainTabContent">
    <div role="tabpanel" class="tab-pane" id="tab-port-month"><div class="legend"></div><div id="grid-port-month" class="ag-theme-balham" style="height:500px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-lane-month"><div class="legend"></div><div id="grid-lane-month" class="ag-theme-balham" style="height:500px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-port-lane-type"><div class="legend"></div><div id="grid-port-lane-type" class="ag-theme-balham" style="height:600px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-weekly-trend">
      <div class="legend"></div>
      <div id="chart-container"><canvas id="chart-weekly-canvas"></canvas></div>
      <div id="grid-weekly-trend" class="ag-theme-balham" style="height:400px;width:100%"></div>
    </div>
    <div role="tabpanel" class="tab-pane" id="tab-booking-actual"><div class="legend"></div><div id="grid-booking-actual" class="ag-theme-balham" style="height:500px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-outbound"><div class="legend"></div><div id="grid-outbound" class="ag-theme-balham" style="height:600px;width:100%"></div></div>
    <div role="tabpanel" class="tab-pane" id="tab-inbound"><div class="legend"></div><div id="grid-inbound" class="ag-theme-balham" style="height:600px;width:100%"></div></div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
let rawData = [];
let grids = {}; // cache grid instances

fetch('data/pivot_data.zip')
  .then(r => r.arrayBuffer())
  .then(buf => JSZip.loadAsync(buf))
  .then(zip => zip.file('pivot_data.json').async('string'))
  .then(txt => { rawData = JSON.parse(txt); initDashboard(); })
  .catch(err => {
    document.body.innerHTML += '<div style="padding:20px;color:red">Failed to load data: ' + err.message + '</div>';
    console.error(err);
  });

function initDashboard() {

const prevYear  = yr => { const y = parseInt(yr); return isNaN(y) ? '' : String(y - 1); };
const prevMonth = mo => {
  if (!mo) return '';
  const [y, m] = mo.split('-').map(Number);
  if (isNaN(y) || isNaN(m)) return '';
  const d = new Date(y, m - 2, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
};

function buildYoYMoM(baseData, groupFields) {
  const aggMap = {};
  baseData.forEach(r => {
    const gf = groupFields.map(f => (r[f] ?? '')).join('|');
    if (!aggMap[gf]) aggMap[gf] = { ...r, 'Actual TEU': 0 };
    aggMap[gf]['Actual TEU'] += (r['Actual TEU'] || 0);
  });
  const valMap = {};
  Object.values(aggMap).forEach(r => {
    const vk = groupFields.map(f => (r[f] ?? '')).join('|');
    valMap[vk] = r['Actual TEU'];
  });
  return Object.values(aggMap).map(r => {
    const vk = groupFields.map(f => (r[f] ?? '')).join('|');
    r['VS. Last Year']  = r['Actual TEU'] - (valMap[[prevYear(r.ATD_Year), r['ATD Month']].join('|')] || 0);
    r['VS. Last Month'] = r['Actual TEU'] - (valMap[[r.ATD_Year, prevMonth(r['ATD Month'])].join('|')] || 0);
    return r;
  });
}

const dataY2026 = rawData.filter(r => String(r['ATD_Year'] || '') === '2026');
const dataOB    = buildYoYMoM(rawData.filter(r => ['OUT','T/S OUT'].includes(r.TYPE)), ['Port','ATD_Year','ATD Month']);
const dataIB    = buildYoYMoM(rawData.filter(r => ['IN','T/S IN'].includes(r.TYPE)),  ['Port','ATD_Year','ATD Month']);

// ─── CHART ────────────────────────────────────────────────────────────────────
function drawWeeklyChart(data) {
  const ctx = document.getElementById('chart-weekly-canvas');
  if (!ctx) return;
  const w2d = new Date().getTimezoneOffset();
  // aggregate by week
  const weekMap = {};
  data.forEach(r => {
    const w = String(r.Week || '');
    if (!w) return;
    weekMap[w] = (weekMap[w] || 0) + (r['Actual TEU'] || 0);
  });
  const labels = Object.keys(weekMap).sort((a,b) => {
    const na = parseInt(a.replace(/\D/g,''));
    const nb = parseInt(b.replace(/\D/g,''));
    return na - nb;
  });
  const values = labels.map(l => weekMap[l]);

  if (window._weeklyChart) window._weeklyChart.destroy();
  window._weeklyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Actual TEU',
        data: values,
        borderColor: '#2c5aa0',
        backgroundColor: 'rgba(44,90,160,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#2c5aa0'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y.toLocaleString() + ' TEU' } } },
      scales: {
        y: { beginAtZero: true, title: { display: true, text: 'Actual TEU' } },
        x: { title: { display: true, text: 'Week' } }
      }
    }
  });
}

// ─── GRID HELPERS ─────────────────────────────────────────────────────────────
function defaultColDef() {
  return {
    sortable: true, filter: true, resizable: true,
    cellStyle: { textAlign: 'left' }
  };
}

function teuCol(field = 'Actual TEU') {
  return {
    field: field,
    headerName: field,
    aggFunc: 'sum',
    cellStyle: { textAlign: 'right' },
    valueFormatter: p => p.value != null ? p.value.toLocaleString() : ''
  };
}

function initGrid(divId, rowData, colDefs, options = {}) {
  const existing = grids[divId];
  if (existing) { existing.setRowData([]); existing.destroy(); }

  const defaultOpts = {
    rowData: rowData,
    columnDefs: colDefs,
    defaultColDef: defaultColDef(),
    animateRows: true,
    suppressMovable: false,
    enableRangeSelection: true,
    enableCharts: false,
  };
  const merged = Object.assign(defaultOpts, options);

  const gridDiv = document.getElementById(divId);
  grids[divId] = new agGrid.Grid(gridDiv, merged);
  return grids[divId];
}

// ─── PORT × LANE × TYPE  (row grouping by Port) ─────────────────────────────
function renderPortLaneType() {
  const cfg = { rows: ['Port','Lane'], cols: ['TYPE','Load Status'], vals: ['Actual TEU'], filter: { 'ATD_Year': '2026' } };
  const src = dataY2026;
  const filtered = applyFilter(src, cfg.filter);

  const colDefs = [
    { field: 'Port', rowGroup: true, hide: true },
    { field: 'Lane', headerName: 'Lane', sortable: true, filter: true },
    ...buildColsForCombo(['TYPE','Load Status'], 'Actual TEU', filtered),
  ];

  const legendEl = document.querySelector('#tab-port-lane-type .legend');
  if (legendEl) legendEl.textContent = 'Row: Port + Lane  |  Col: TYPE + Load Status  |  Filter: ATD_Year=2026  |  Val: Actual TEU  |  (Drag Lane to Rows to re-group)';

  initGrid('grid-port-lane-type', filtered, colDefs, {
    autoGroupColumnDef: {
      headerName: 'Port / Lane',
      minWidth: 200,
      cellRendererParams: { suppressCount: false }
    },
    groupDefaultExpanded: 0,
    animateRows: true,
    suppressAggFuncInHeader: false,
  });
}

// ─── GENERIC TAB ──────────────────────────────────────────────────────────────
function buildColsForCombo(cols, valField, data) {
  // collect unique col combos
  const comboSet = new Set();
  data.forEach(r => {
    comboSet.add(cols.map(f => r[f] ?? '').join('||'));
  });
  const combos = [...comboSet].sort();
  return combos.map(combo => {
    const parts = combo.split('||');
    const colVal = parts.join(' × ');
    return {
      field: combo,
      headerName: colVal,
      aggFunc: 'sum',
      cellStyle: { textAlign: 'right' },
      valueFormatter: p => p.value != null ? p.value.toLocaleString() : '',
      sortPriority: 0
    };
  });
}

function applyFilter(data, filter) {
  return data.filter(row => {
    for (const [k, v] of Object.entries(filter || {})) {
      if (String(row[k] ?? '') !== v) return false;
    }
    return true;
  });
}

function renderTab(cfg, divId, dataSrc) {
  const filtered = applyFilter(dataSrc || rawData, cfg.filter);
  const cols = cfg.cols.map(f => ({ field: f, sortable: true, filter: true }));
  const vals = cfg.vals.map(f => ({
    field: f,
    headerName: f,
    aggFunc: f === 'Fulfill Rate' ? 'avg' : 'sum',
    cellStyle: { textAlign: 'right' },
    valueFormatter: p => {
      if (p.value == null) return '';
      if (f === 'Fulfill Rate') return (p.value * 100).toFixed(1) + '%';
      return p.value.toLocaleString();
    }
  }));
  const colDefs = [
    ...cfg.rows.map(f => ({ field: f, sortable: true, filter: true })),
    ...cols,
    ...vals
  ];
  const legendEl = document.querySelector('#' + divId + ' + .legend, #' + divId.replace('grid-','tab-') + ' .legend');
  initGrid(divId, filtered, colDefs, {
    groupDefaultExpanded: 0,
    autoGroupColumnDef: { minWidth: 150 },
  });
}

// ─── TAB INIT ─────────────────────────────────────────────────────────────────
const tabs = [
  {
    id: 'port-month', title: 'Port × Month', data: dataY2026,
    filter: { 'ATD_Year': '2026' },
    rows: ['Port'], cols: ['ATD Month'], vals: ['Actual TEU'],
    legend: 'Row: Port  |  Col: ATD Month  |  Filter: ATD_Year=2026  |  Val: Actual TEU'
  },
  {
    id: 'lane-month', title: 'Lane × Month', data: dataY2026,
    filter: { 'ATD_Year': '2026' },
    rows: ['Lane'], cols: ['ATD Month'], vals: ['Actual TEU'],
    legend: 'Row: Lane  |  Col: ATD Month  |  Filter: ATD_Year=2026  |  Val: Actual TEU'
  },
  { id: 'port-lane-type', title: 'Port × Lane × Type', data: dataY2026, isSpecial: true },
  {
    id: 'weekly-trend', title: 'Weekly Trend', data: dataY2026,
    filter: { 'ATD_Year': '2026' },
    rows: ['Week'], cols: [], vals: ['Actual TEU'],
    legend: 'Row: Week  |  Filter: ATD_Year=2026  |  Val: Actual TEU'
  },
  {
    id: 'booking-actual', title: 'Booking vs Actual', data: dataY2026,
    filter: { 'ATD_Year': '2026' },
    rows: ['Port'], cols: [], vals: ['Booking TEU', 'Actual TEU', 'Fulfill Rate'],
    legend: 'Row: Port  |  Filter: ATD_Year=2026  |  Val: Booking TEU + Actual TEU + Fulfill Rate'
  },
  {
    id: 'outbound', title: 'Outbound Report', data: dataOB,
    rows: ['Port'], cols: ['ATD_Year', 'ATD Month'], vals: ['Actual TEU', 'VS. Last Year', 'VS. Last Month'],
    legend: 'Row: Port  |  Col: ATD_Year + ATD Month  |  Val: Actual TEU + VS LY + VS LM'
  },
  {
    id: 'inbound', title: 'Inbound Report', data: dataIB,
    rows: ['Port'], cols: ['ATD_Year', 'ATD Month'], vals: ['Actual TEU', 'VS. Last Year', 'VS. Last Month'],
    legend: 'Row: Port  |  Col: ATD_Year + ATD Month  |  Val: Actual TEU + VS LY + VS LM'
  },
];

tabs.forEach(tab => {
  const li = document.createElement('li');
  li.innerHTML = `<a href="#tab-${tab.id}" data-toggle="tab" role="tab">${tab.title}</a>`;
  document.getElementById('mainTabs').appendChild(li);

  // update legend div
  const tabEl = document.getElementById('tab-' + tab.id);
  const legendDiv = tabEl ? tabEl.querySelector('.legend') : null;
  if (legendDiv && tab.legend) legendDiv.textContent = tab.legend;
});

$('#mainTabs a[data-toggle="tab"]').on('shown.bs.tab', function(e) {
  const id = e.target.getAttribute('href').replace('#tab-', '');
  if (id === 'weekly-trend' && !window._weeklyChart) {
    drawWeeklyChart(dataY2026);
  }
  if (!grids['grid-' + id]) {
    const tab = tabs.find(t => t.id === id);
    if (!tab) return;
    if (tab.isSpecial) {
      if (id === 'port-lane-type') renderPortLaneType();
    } else {
      renderTab({ filter: tab.filter, rows: tab.rows, cols: tab.cols, vals: tab.vals }, 'grid-' + id, tab.data);
    }
  }
});

// trigger first tab
document.getElementById('mainTabs').querySelector('li').classList.add('active');
document.getElementById('tab-port-month').classList.add('active');

} // initDashboard
</script>
</body>
</html>
